#
# PRD-033 — full-agent Docker migration compose (REPLACES docker-compose.yml for the
# contained deployment; the ship file's `network_mode: host` is unacceptable here).
#
# Cutover:
#   HERMES_UID=$(id -u) HERMES_GID=$(id -g) \
#     docker compose -p hermes-agent -f docker-compose.migration.yml up -d --build
# Then attach the externally-managed dependency containers to the internal net
# (docker/migration/cutover.sh does this via `docker network connect`, no recreate).
#
# Security invariants (verified at preflight by docker inspect):
#   - NO network_mode: host, NO privileged, NO pid/ipc: host, NO docker.sock mount.
#   - Agent (gateway/dashboard) is on `hermes-agent-deps` (internal: true) ONLY → it has
#     NO default route → it CANNOT reach the host LAN, FedPulse, sidekick, or the internet.
#   - The ONLY egress is the dual-homed Discord proxy (allowlist deny-by-default).
#   - The ONLY host mount is ~/.hermes:/opt/data.
#
services:
  gateway:
    image: hermes-agent:migration
    container_name: hermes
    restart: unless-stopped
    networks:
      - hermes-agent-deps          # internal-only; reaches deps by service DNS, no route out
      - hermes-exec-bridge         # PRD-047 FR-4: p2p path to the exec plane (jail); two members ONLY
    volumes:
      - ~/.hermes:/opt/data        # the ONLY host mount (RW)
      # PRD-047 FR-5: SSH client key INTO the jail (a credential into the exec
      # plane, not out of it). RO + outside /opt/data = boot-chown-safe
      # (/opt/relay precedent). Provisioned by scripts/prd047-provision-execbridge.sh.
      - ~/.hermes-execbridge/client:/opt/execbridge/client:ro
      # PRD-032 enforce-hardening (2026-06-27): layer the security-critical files
      # READ-ONLY over the RW mount so a contained-T2 shell structurally CANNOT
      # write them — closes the "truncate config.yaml turns enforce off" STOP and
      # secret-file tamper, path-independently (kernel-enforced; beats any regex).
      # Reads still work. Owner edits the HOST file; takes effect on restart.
      # auth.json is intentionally LEFT RW (OAuth token refresh writes it) — it is
      # covered by the file-tool T4 classifier + the shell secret-ref pattern.
      - ~/.hermes/config.yaml:/opt/data/config.yaml:ro
      - ~/.hermes/.env:/opt/data/.env:ro
      - ~/.hermes/mem0.json:/opt/data/mem0.json:ro
      # PRD-035 advisory relay: the hermes-only relay dir (socket + bearer),
      # bind-mounted READ-ONLY into the GATEWAY container ONLY (never the
      # dashboard — FR-5 UDS boundary). RO + a path outside /opt/data means the
      # stage-2 boot chown (which only touches /opt/data + subdirs) never
      # re-owns it (FR-11 chown-lock exclusion). The relay itself runs host-side
      # as a systemd USER service; this mount only exposes the socket to reach it.
      - ~/.hermes-relay:/opt/relay:ro
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - HERMES_CONTAINERIZED=1     # NF-3: positive containment probe — local_exec_is_contained
                                   # (T2 re-tier) is honored ONLY when this is set / inside a container
      - MEM0_TELEMETRY=False       # PRD-036: silence mem0ai PostHog telemetry. Read at module-import
                                   # time, so it must be in the base env (not .env, which the app loads
                                   # later via dotenv). Egress-blocked by the discord-proxy regardless;
                                   # this kills the retry noise + is defense-in-depth (no outbound).
      - API_SERVER_HOST=0.0.0.0    # host exposure stays loopback-only via the publish below
      # Discord egress through the allowlist proxy. Targeted + standard proxy vars; deps
      # and loopback bypass the proxy so the agent talks to LLM/embed/Qdrant directly.
      - DISCORD_PROXY=http://hermes-discord-proxy:8888
      - HTTP_PROXY=http://hermes-discord-proxy:8888
      - HTTPS_PROXY=http://hermes-discord-proxy:8888
      - http_proxy=http://hermes-discord-proxy:8888
      - https_proxy=http://hermes-discord-proxy:8888
      - NO_PROXY=llama-qwen36-35b,llama-qwen3-4b,tei-bge-m3,qdrant,hermes-kokoro,localhost,127.0.0.1
      - no_proxy=llama-qwen36-35b,llama-qwen3-4b,tei-bge-m3,qdrant,hermes-kokoro,localhost,127.0.0.1
    # NOTE: the agent is internal-only, so Docker disables published-port DNAT here.
    # Host ingress (127.0.0.1:8642 for cockpit/RTVC) is provided by the host-ingress
    # forwarder below, which reaches this container as `hermes:8642` on the internal net.
    command: ["gateway", "run"]
    # FR-11 — resource containment (replaces sylva-autonomy.slice). Hard cgroup caps.
    mem_limit: 48g
    pids_limit: 8192
    oom_score_adj: 500             # agent is sacrificed before the LLM servers (-900)

  # PRD-047 increment 1 — the exec-plane jail (SHIPS DARK: the "exec-plane"
  # profile means a plain `up -d` NEVER starts this; arming is explicit).
  #
  # Trust boundary (PRD-047 FR-1/2/4, jail-design pass folded 2026-07-20):
  #   - mounts ONLY the two workspace dirs (rw) + skills (ro) + relays (ro,
  #     PRD-048 carve) + the sshd server material (ro). NO /opt/data root:
  #     no .env / auth.json / config.yaml / autonomy/ / jobs.json / state.db.
  #   - entrypoint bypasses /init + stage2 (STOP-3: stock boot would self-seed
  #     .env/config.yaml/SOUL.md into the namespace) — run.sh starts sshd only.
  #   - network: hermes-exec-bridge ONLY — no deps net (Qdrant/LLM/TEI/dashboard
  #     unreachable), no egress net (no Discord proxy, no internet).
  #   - same image as the gateway; UID pinned to the host user for workspace
  #     interop; isolation = namespaces + mounts + custody, not the UID number.
  #
  # ARMING (owner runbook — after image rebuild + provisioning):
  #   scripts/prd047-provision-execbridge.sh
  #   HERMES_UID=$(id -u) HERMES_GID=$(id -g) docker compose -p hermes-agent \
  #     -f docker-compose.migration.yml --profile exec-plane up -d exec-plane
  #   then set HERMES_EXEC_BACKEND=jail-ssh on the gateway service + recreate,
  #   and run scripts/prd047-exec-plane-drills.sh (AC-007..010).
  exec-plane:
    image: hermes-agent:migration
    container_name: hermes-exec
    hostname: hermes-exec
    restart: unless-stopped
    profiles: ["exec-plane"]
    entrypoint: ["/opt/hermes/docker/exec-plane/run.sh"]
    # Starts as ROOT (no `user:` override) so run.sh can remap the `hermes`
    # account to the host UID/GID (matching the shared workspace ownership) and
    # sshd can privilege-separate. The login session drops to `hermes`
    # (PermitRootLogin no). Isolation = mounts + network + PID namespace, not
    # the process uid — the jail mounts no secrets/governance and has no egress.
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
    networks:
      - hermes-exec-bridge
    volumes:
      - ~/.hermes/work:/opt/data/work
      - ~/.hermes/workspace:/opt/data/workspace
      - ~/.hermes/skills:/opt/data/skills:ro
      - ~/.hermes-relay:/opt/relay:ro
      - ~/.hermes-execbridge/server:/opt/execbridge/server:ro
    mem_limit: 8g
    pids_limit: 2048
    oom_score_adj: 500

  dashboard:
    image: hermes-agent:migration
    container_name: hermes-dashboard
    restart: unless-stopped
    depends_on:
      - gateway
    networks:
      - hermes-agent-deps
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      # Role gate: skip per-profile gateway reconciliation at boot. Without this
      # the dashboard container starts a SECOND full gateway (the PID-1-argv
      # role detection is broken under s6-overlay), causing duplicate Discord
      # logins + doubled cron/nudge cycles against the shared /opt/data.
      - HERMES_ROLE=dashboard
      # Cross-container gateway liveness/state: the dashboard runs in a SEPARATE
      # container, so the shared gateway_state.json PID is meaningless in this
      # namespace (reported gateway "stopped" even when healthy). Point the
      # dashboard at the gateway's HTTP health endpoint on the internal net so its
      # liveness probe-fallback works (web_server.py _probe_gateway_health).
      # PRD-033 fast-follow. (Restart-from-dashboard still no-ops by design — use
      # `docker exec hermes hermes gateway restart`.)
      - GATEWAY_HEALTH_URL=http://hermes:8642
    # Internal-only (no host publish here); host ingress 127.0.0.1:9119 via host-ingress.
    # Bind 0.0.0.0 INSIDE so the forwarder can reach it. --insecure REMOVED 2026-07-06 (PRD-045):
    # the earlier "safe because only the loopback forwarder reaches it" rationale was WRONG — the
    # `hermes` AGENT container is a sibling on this same internal net and (proxy-bypassed) could scrape
    # the SPA-injected _SESSION_TOKEN from GET / and replay it to reach every mutating route, letting a
    # code-exec agent reconfigure itself (bypassing the PRD-032 ladder/approval/budget/killswitch).
    # Dropping --insecure engages the real cookie/session gate. Auth = the `basic` provider, already
    # host-provisioned via HERMES_DASHBOARD_BASIC_AUTH_{USERNAME,PASSWORD_HASH,SECRET} in ~/.hermes/.env
    # (env-wins over config.yaml dashboard.basic_auth). Provider fails CLOSED (won't bind) if creds are
    # absent — the .env creds MUST exist before dropping --insecure.
    command: ["dashboard", "--host", "0.0.0.0", "--no-open"]
    mem_limit: 2g
    pids_limit: 1024

  # FR-6 — host-ingress forwarder. Publishes the loopback endpoints the cockpit (host)
  # and RTVC voice expect, and forwards them to the internal-only agent/dashboard.
  # Dual-homed so publishing works; fixed-target socat so it grants the agent no egress.
  host-ingress:
    build:
      context: ./docker/host-ingress
    image: hermes-host-ingress:local
    container_name: hermes-host-ingress
    restart: unless-stopped
    depends_on:
      - gateway
      - dashboard
    networks:
      - hermes-agent-deps          # reaches hermes:8642 / hermes-dashboard:9119
      - hermes-egress              # non-internal -> enables host port publishing
    ports:
      - "127.0.0.1:8642:8642"          # gateway API — host cockpit (FR-6) + RTVC voice (FR-7); loopback-only (sensitive)
      - "127.0.0.1:9119:9119"          # dashboard — local + SSH-tunnel access
      - "192.168.50.182:9119:9119"     # dashboard — LAN-accessible (gaming rig), bound to the LAN IP only
                                        # (not 0.0.0.0). LAN clients now authenticate (dashboard.basic_auth) —
                                        # --insecure was removed 2026-07-06 (PRD-045); the LAN is NOT a trust
                                        # boundary because the agent container sits inside it.
    mem_limit: 128m
    pids_limit: 128

  discord-proxy:
    build:
      context: ./docker/discord-proxy
    image: hermes-discord-proxy:local
    container_name: hermes-discord-proxy
    restart: unless-stopped
    networks:
      - hermes-agent-deps          # reachable by the agent as hermes-discord-proxy:8888
      - hermes-egress              # its (only) path to the allowlisted Discord hosts
    mem_limit: 256m
    pids_limit: 128

networks:
  # Both networks are created imperatively by docker/migration/cutover.sh BEFORE this
  # compose runs, so the four dependency containers can be multi-homed onto the internal
  # net and are reachable the instant the agent starts. Declared external here.
  #   hermes-agent-deps: `docker network create --internal hermes-agent-deps`
  #   hermes-egress:     `docker network create hermes-egress`
  # Internal bridge: NO default route off the box. The agent lives here and ONLY here.
  hermes-agent-deps:
    external: true
  # Normal egress bridge: ONLY the Discord proxy touches this (its second foot).
  hermes-egress:
    external: true
  # PRD-047 FR-4 — p2p jail bridge: gateway <-> hermes-exec ONLY. Compose-managed
  # (NOT external) on purpose: no other stack ever joins it, and it needs no
  # cutover.sh pre-creation since both members live in this file. internal:true =
  # no route off the box. Residual (ruled ACCEPT-401): the gateway's :8642 binds
  # 0.0.0.0 so it is TCP-reachable from the jail over this bridge — mutating/
  # control/SSE routes are auth-gated and the jail cannot read API_SERVER_KEY;
  # unauth /health(+/detailed) liveness leak accepted, bound at increment 2.
  hermes-exec-bridge:
    internal: true
