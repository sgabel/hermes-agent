# PRD-033 FR-3 — Discord-only egress proxy for the containerized hermes agent.
# Dual-homed: one foot on `hermes-agent-deps` (internal:true; reachable by the
# agent as http://hermes-discord-proxy:8888) and one foot on `hermes-egress`
# (normal bridge with a default route). Deny-by-default host allowlist in
# /etc/tinyproxy/filter restricts the egress foot to Discord hostnames ONLY.
#
# HARD boundary note: the real FedPulse/LAN isolation guarantee is that the AGENT
# has NO route except this proxy and the internal deps (internal:true, no default
# route). This allowlist is the policy layer on the proxy's egress foot; it denies
# RFC1918/LAN/FedPulse by virtue of FilterDefaultDeny On (only Discord hosts pass).

User tinyproxy
Group tinyproxy

Port 8888
Listen 0.0.0.0
Timeout 600

# --- Who may USE the proxy: Docker bridge RFC1918 ranges only ---
Allow 172.16.0.0/12
Allow 192.168.0.0/16
Allow 10.0.0.0/8
Allow 127.0.0.1

# --- Egress allowlist (deny-by-default), matched on request HOST ---
Filter "/etc/tinyproxy/filter"
FilterDefaultDeny On
FilterExtended On
FilterURLs Off
FilterCaseSensitive Off

# HTTPS/WSS CONNECT to standard TLS port only.
ConnectPort 443

LogFile "/var/log/tinyproxy/tinyproxy.log"
LogLevel Info
DisableViaHeader Yes
MaxClients 50
