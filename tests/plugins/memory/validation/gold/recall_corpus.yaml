  - {id: q-14, query: "the chronicle is an episodic journal and the recall assist", expected_ids: [rc-007, rc-009], filter: {speaker: sylva}}
  - {id: q-15, query: "grant eligibility ranking rebalance to the top tier", expected_ids: [rc-001, rc-002, rc-003], filter: {date_from: "2026-05-04", date_to: "2026-05-05"}}
  - {id: q-16, query: "moving the agent into docker and image rebuild", expected_ids: [rc-010, rc-011, rc-012], filter: {date_from: "2026-06-10", date_to: "2026-06-12"}}
  - {id: q-17, query: "Scott weekend family fireworks and a new novel", expected_ids: [rc-022, rc-024, rc-028], filter: {speaker: scott}}
